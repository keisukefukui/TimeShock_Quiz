<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIME SHOCK クイズ</title>
  <script src="./questions.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #060608;
      --card:   #0c0c14;
      --orange: #ff5500;
      --bright: #ff8800;
      --sub:    #444455;
      --text:   #f0f0ff;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    .screen { display: none; width: 100%; max-width: 700px; }
    .screen.active { display: block; }

    /* ── START ── */
    #screen-start { text-align: center; }
    .logo {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--orange);
      text-shadow: 0 0 40px #ff550099, 0 0 80px #ff550044;
      margin-bottom: 4px;
    }
    .logo-sub { font-size: 0.85rem; letter-spacing: 0.4em; color: var(--sub); margin-bottom: 40px; }
    .diff-label { font-size: 0.75rem; letter-spacing: 0.3em; color: var(--sub); margin-bottom: 16px; }
    .diff-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 36px; flex-wrap: wrap; }
    .diff-btn {
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 16px 28px;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      min-width: 100px;
    }
    .diff-btn:hover { transform: translateY(-2px); }
    .diff-btn.sel   { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.15); transform: translateY(-3px); }
    .diff-btn.lv1 { background: #0d2b18; color: #4ade80; }
    .diff-btn.lv1.sel { background: #14452a; }
    .diff-btn.lv2 { background: #2b1a0d; color: #fb923c; }
    .diff-btn.lv2.sel { background: #45280a; }
    .diff-btn.lv3 { background: #2b0d0d; color: #f87171; }
    .diff-btn.lv3.sel { background: #450a0a; }
    .btn-start {
      display: inline-block;
      background: linear-gradient(135deg, #ff5500, #cc2200);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 20px 64px;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      cursor: pointer;
      box-shadow: 0 0 50px #ff550055;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      opacity: 0.3;
      pointer-events: none;
    }
    .btn-start.ready { opacity: 1; pointer-events: auto; }
    .btn-start.ready:hover  { transform: scale(1.05); box-shadow: 0 0 70px #ff5500aa; }
    .btn-start.ready:active { transform: scale(0.97); }
    .start-note { margin-top: 16px; font-size: 0.72rem; color: #28282f; }

    /* ── COUNTDOWN ── */
    #screen-countdown { text-align: center; padding: 20px 0; }
    .cd-label { font-size: clamp(0.9rem, 3vw, 1.1rem); letter-spacing: 0.35em; color: var(--sub); margin-bottom: 20px; }
    .cd-num {
      font-size: clamp(7rem, 30vw, 14rem);
      font-weight: 900;
      color: var(--orange);
      text-shadow: 0 0 80px #ff550099;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      animation: cdpulse 0.9s ease-in-out infinite;
    }
    @keyframes cdpulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.85; }
    }

    /* ── QUIZ：2カラムレイアウト ── */
    #screen-quiz { max-width: 1100px; text-align: left; }

    .quiz-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    /* 左：メイン出題エリア */
    .quiz-main {
      flex: 1;
      min-width: 0;
      text-align: center;
    }

    .timer-wrap { margin-bottom: 12px; }
    .timer-num {
      font-size: clamp(3.5rem, 14vw, 8rem);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 8px;
      transition: color 0.25s, text-shadow 0.25s;
    }
    .timer-num.ok     { color: #ff8800; text-shadow: 0 0 30px #ff880066; }
    .timer-num.warn   { color: #ff4400; text-shadow: 0 0 30px #ff440088; }
    .timer-num.danger { color: #ff0000; text-shadow: 0 0 40px #ff000099; animation: flash 0.35s step-end infinite; }
    @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    .timer-bar-bg { height: 7px; background: #141420; border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
    .timer-bar { height: 100%; border-radius: 99px; transition: width 0.08s linear, background 0.3s; }
    .timer-bar.ok     { background: linear-gradient(90deg, #cc4400, #ff8800); }
    .timer-bar.warn   { background: linear-gradient(90deg, #880000, #ff4400); }
    .timer-bar.danger { background: #ff0000; }

    /* 問題番号・残り問数 */
    .progress-big {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      margin-bottom: 2px;
    }
    .prog-now {
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--orange);
      line-height: 1;
    }
    .prog-total {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-weight: 700;
      color: var(--sub);
    }
    .prog-remain {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      color: var(--sub);
      text-align: center;
      margin-bottom: 14px;
    }

    .q-card {
      background: var(--card);
      border: 1px solid #ff550022;
      border-radius: 18px;
      padding: clamp(18px, 3.5vw, 28px) clamp(16px, 3.5vw, 28px);
      margin-bottom: 16px;
      text-align: left;
    }
    .q-num-badge {
      display: inline-block;
      background: var(--orange);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      padding: 4px 16px;
      border-radius: 99px;
      margin-bottom: 12px;
    }
    .q-text { font-size: clamp(1rem, 3.2vw, 1.45rem); font-weight: bold; line-height: 1.75; color: #e8e8ff; margin-bottom: 18px; }
    .answer-section { border-top: 1px solid #ff550018; padding-top: 14px; }
    .answer-label { font-size: 0.62rem; letter-spacing: 0.35em; color: #2a2a44; margin-bottom: 7px; }
    .answer-text { font-size: clamp(1.2rem, 4.5vw, 2rem); font-weight: 900; color: var(--bright); text-shadow: 0 0 12px #ff880033; line-height: 1.4; }

    .btn-row { display: flex; gap: 12px; }
    .btn-correct {
      flex: 1;
      background: linear-gradient(135deg, #ff5500, #cc2200);
      color: #fff;
      border: none;
      border-radius: 13px;
      padding: 18px 12px;
      font-size: clamp(0.95rem, 3vw, 1.1rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 0 4px 24px #ff550044;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-correct:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px #ff550077; }
    .btn-correct:active { transform: translateY(1px); }
    .btn-end {
      flex: 1;
      background: #0a0a14;
      color: #ff2200;
      border: 2px solid #ff2200;
      border-radius: 13px;
      padding: 18px 12px;
      font-size: clamp(0.95rem, 3vw, 1.1rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-end:hover { background: #1a0000; box-shadow: 0 0 24px #ff220033; }

    /* 右：進行ログパネル */
    .quiz-log {
      width: 260px;
      flex-shrink: 0;
      background: var(--card);
      border: 1px solid #ff550018;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
    }

    .log-heading {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      color: var(--sub);
      padding: 11px 14px;
      border-bottom: 1px solid #1a1a28;
      flex-shrink: 0;
      background: #0a0a12;
    }

    .log-empty {
      font-size: 0.75rem;
      color: #2a2a38;
      text-align: center;
      padding: 24px 12px;
    }

    .log-list {
      overflow-y: auto;
      flex: 1;
    }

    .log-entry {
      padding: 10px 14px;
      border-bottom: 1px solid #0f0f1c;
      animation: logslide 0.25s ease;
    }
    @keyframes logslide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-num {
      font-size: 0.6rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      color: #333355;
      margin-bottom: 4px;
    }
    .log-q {
      font-size: 0.78rem;
      color: #666688;
      line-height: 1.55;
      margin-bottom: 5px;
    }
    .log-a {
      font-size: 0.92rem;
      font-weight: 900;
      color: var(--bright);
    }

    /* モバイル：ログを下部に縦積み */
    @media (max-width: 820px) {
      .quiz-layout   { flex-direction: column; }
      .quiz-log      { width: 100%; max-height: 220px; }
    }

    /* ── クイズ中：画面全体を完全固定（ログが増えても1ミリも動かない） ── */
    body.quiz-active {
      height: 100dvh;
      height: 100vh;
      overflow: hidden;
      padding: 8px 10px;
      align-items: stretch;
    }
    body.quiz-active #screen-quiz {
      width: 100%;
      height: 100%;
      max-width: 1100px;
      margin: 0 auto;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* quiz-layout が残り全高を占有し、外にはみ出させない */
    body.quiz-active .quiz-layout {
      flex: 1 1 0;
      min-height: 0;
      height: 0;          /* flex-basisを0にして親の高さに厳密に従わせる */
      overflow: hidden;
      align-items: stretch;
    }
    /* メインエリア：ログに押しつぶされない */
    body.quiz-active .quiz-main {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* タイマー・進捗・ボタン行：絶対に縮まない */
    body.quiz-active .timer-wrap,
    body.quiz-active .progress-big,
    body.quiz-active .prog-remain,
    body.quiz-active .btn-row {
      flex-shrink: 0;
    }
    /* ボタン：高さ固定 */
    body.quiz-active .btn-correct,
    body.quiz-active .btn-end {
      height: 56px;
      padding: 0 12px;
    }
    /* 問題カード：余白を全部埋める。カード内でのみスクロール */
    body.quiz-active .q-card {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
    }
    body.quiz-active .q-text {
      font-size: clamp(0.82rem, 3vw, 1.45rem);
      overflow-wrap: break-word;
    }
    body.quiz-active .answer-text {
      font-size: clamp(0.95rem, 4vw, 2rem);
      overflow-wrap: break-word;
    }
    /* モバイル：問題カード固定 → ボタン位置を画面中央やや下で固定 */
    @media (max-width: 820px) {
      /* quiz-mainはコンテンツ分だけの高さ（伸びない） */
      body.quiz-active .quiz-main {
        flex: 0 0 auto;
      }
      /* 問題カードをvhで固定 → どの問題でも高さ不変 → ボタン位置が固定 */
      body.quiz-active .q-card {
        flex: 0 0 32vh;
        height: 32vh;
        max-height: 32vh;
        overflow-y: auto;
      }
      /* ログが残りのスペースを埋める（上限155px） */
      body.quiz-active .quiz-log {
        flex: 1 1 0;
        min-height: 60px;
        max-height: 155px;
        height: auto;
        overflow: hidden;
      }
      body.quiz-active .log-list {
        height: calc(100% - 37px);
        overflow-y: auto;
        overflow-x: hidden;
      }
    }
    /* デスクトップ：ログは縦いっぱい */
    @media (min-width: 821px) {
      body.quiz-active .quiz-log {
        flex: 0 0 260px;
        max-height: none;
        overflow: hidden;
      }
    }

    /* ── END / REVIEW ── */
    #screen-end { max-height: 92vh; overflow-y: auto; text-align: center; }
    .end-header { padding: 28px 0 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .end-logo  { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 900; letter-spacing: 0.2em; color: var(--sub); margin-bottom: 8px; }
    .end-title { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; color: var(--orange); text-shadow: 0 0 50px #ff550088; margin-bottom: 20px; }
    .btn-back {
      background: #0c0c14;
      color: #888899;
      border: 1px solid #222233;
      border-radius: 10px;
      padding: 12px 36px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: 4px;
    }
    .btn-back:hover { color: #bbbbdd; border-color: #555566; }
    .review-heading { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--sub); margin: 24px 0 12px; border-top: 1px solid #1a1a28; padding-top: 24px; }
    .review-list { text-align: left; }
    .review-item { background: var(--card); border: 1px solid #ff550014; border-radius: 14px; padding: 16px 20px; margin-bottom: 10px; }
    .review-num { display: inline-block; background: #1a1a28; color: var(--sub); font-size: 0.7rem; font-weight: bold; letter-spacing: 0.12em; padding: 2px 12px; border-radius: 99px; margin-bottom: 10px; }
    .review-q { font-size: clamp(0.9rem, 3vw, 1.05rem); font-weight: bold; color: #c8c8e8; line-height: 1.6; margin-bottom: 8px; }
    .review-a-wrap { display: flex; align-items: baseline; gap: 8px; }
    .review-a-label { font-size: 0.62rem; letter-spacing: 0.2em; color: #333355; flex-shrink: 0; }
    .review-a { font-size: clamp(1rem, 3.5vw, 1.3rem); font-weight: 900; color: var(--bright); }
  </style>
</head>
<body>

<!-- START（難易度選択） -->
<div id="screen-start" class="screen active">
  <div class="logo">TIME SHOCK</div>
  <div class="logo-sub">QUIZ MASTER</div>
  <p class="diff-label">難易度を選んでください</p>
  <div class="diff-row">
    <button class="diff-btn lv1" onclick="selectDiff('easy',   this)">初級</button>
    <button class="diff-btn lv2" onclick="selectDiff('medium', this)">中級</button>
    <button class="diff-btn lv3" onclick="selectDiff('hard',   this)">上級</button>
  </div>
  <button id="btn-start" class="btn-start" onclick="startQuiz()">クイズスタート</button>
  <p class="start-note">※ スタートと同時に BGM が自動再生されます</p>
</div>

<!-- COUNTDOWN -->
<div id="screen-countdown" class="screen">
  <div class="cd-label">まもなくスタート</div>
  <div id="countdown-num" class="cd-num">5</div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-layout">

    <!-- 左：メイン出題エリア -->
    <div class="quiz-main">
      <div class="timer-wrap">
        <div id="timer-num" class="timer-num ok">5.0</div>
        <div class="timer-bar-bg">
          <div id="timer-bar" class="timer-bar ok" style="width:100%"></div>
        </div>
      </div>

      <!-- 問題番号（大きく常時表示） -->
      <div class="progress-big">
        <span id="prog-now" class="prog-now">1</span>
        <span class="prog-total">&thinsp;/&thinsp;12 問目</span>
      </div>
      <div id="prog-remain" class="prog-remain">あと 11 問</div>

      <div class="q-card">
        <div id="q-num-badge" class="q-num-badge">Q1</div>
        <div id="q-text"      class="q-text">問題文</div>
        <div class="answer-section">
          <div class="answer-label">A N S W E R</div>
          <div id="answer-text" class="answer-text">答え</div>
        </div>
      </div>

      <div class="btn-row">
        <button id="btn-correct" class="btn-correct" onclick="onCorrect()">&#x2714; 正解（次へ）</button>
        <button id="btn-end"     class="btn-end"     onclick="endQuiz(true)" style="display:none">クイズ終了</button>
      </div>
    </div>

    <!-- 右：進行ログパネル -->
    <div class="quiz-log">
      <div class="log-heading">進行ログ（直近の問題）</div>
      <div id="log-list" class="log-list">
        <div class="log-empty">問題が進むとここに表示されます</div>
      </div>
    </div>

  </div>
</div>

<!-- END / REVIEW -->
<div id="screen-end" class="screen">
  <div class="end-header">
    <div class="end-logo">TIME SHOCK</div>
    <div class="end-title">全問終了！</div>
    <button class="btn-back" onclick="goBack()">戻る</button>
  </div>
  <p class="review-heading">全 12 問　問題と答えの一覧</p>
  <div id="review-list" class="review-list"></div>
</div>

<audio id="bgm" src="./TimeShockBGM.mp3"></audio>

<script>
  var COUNTDOWN = 5;
  var Q_TIME    = 5;
  var QUIZ_END  = 66;
  var TOTAL     = 12;

  var questions    = [];
  var currentQ     = -1;
  var startMs      = 0;
  var qStartMs     = 0;
  var q12Limit     = 0;
  var accBonus     = 0;
  var selectedDiff = null;
  var uiTimer      = null;
  var qTimer       = null;
  var ended        = false;

  var bgmEl = document.getElementById('bgm');

  function gid(id) { return document.getElementById(id); }
  function elapsed()  { return (Date.now() - startMs)  / 1000; }
  function qElapsed() { return (Date.now() - qStartMs) / 1000; }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    gid(id).classList.add('active');
    document.body.classList.toggle('quiz-active', id === 'screen-quiz');
  }

  function selectDiff(key, btn) {
    selectedDiff = key;
    document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('sel'); });
    btn.classList.add('sel');
    gid('btn-start').classList.add('ready');
  }

  function startQuiz() {
    if (!selectedDiff) return;
    var bank = (window.QUIZ_BANK && window.QUIZ_BANK[selectedDiff]) || [];
    if (bank.length < TOTAL) {
      alert('問題数が足りません（' + bank.length + '問）。questions.js に問題を追加してください。');
      return;
    }
    questions = shuffle(bank).slice(0, TOTAL);
    currentQ  = -1;
    accBonus  = 0;
    ended     = false;
    startMs   = Date.now();

    /* ログをリセット */
    gid('log-list').innerHTML = '<div class="log-empty">問題が進むとここに表示されます</div>';

    bgmEl.currentTime = 0;
    bgmEl.play().catch(function(){});

    showScreen('screen-countdown');
    gid('countdown-num').textContent = '5';

    clearInterval(uiTimer);
    uiTimer = setInterval(tick, 80);
    qTimer  = setTimeout(function() { beginQ(0); }, COUNTDOWN * 1000);
  }

  function beginQ(idx) {
    /* 直前の問題をログに追加 */
    if (idx > 0) { addToLog(idx - 1); }

    currentQ = idx;
    qStartMs = Date.now();
    var isLast = (idx === TOTAL - 1);

    if (isLast) {
      q12Limit = Math.max(1, QUIZ_END - elapsed());
    }

    /* 問題番号・残り問数を更新 */
    var remain = TOTAL - (idx + 1);
    gid('prog-now').textContent    = idx + 1;
    gid('prog-remain').textContent = 'あと ' + remain + ' 問';

    var q = questions[idx];
    gid('q-num-badge').textContent = 'Q' + (idx + 1);
    gid('q-text').textContent      = q.question;
    gid('answer-text').textContent = q.answer;

    gid('btn-correct').style.display = isLast ? 'none' : 'flex';
    gid('btn-end').style.display     = isLast ? 'flex' : 'none';

    showScreen('screen-quiz');

    clearTimeout(qTimer);
    if (!isLast) {
      qTimer = setTimeout(function() { beginQ(idx + 1); }, Q_TIME * 1000);
    } else {
      qTimer = setTimeout(function() { endQuiz(false); }, q12Limit * 1000);
    }
  }

  /* 進行ログにエントリを追加（最新が一番上） */
  function addToLog(idx) {
    var q    = questions[idx];
    var list = gid('log-list');

    /* 初回追加時はプレースホルダーを消す */
    var empty = list.querySelector('.log-empty');
    if (empty) { list.removeChild(empty); }

    var entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML =
      '<div class="log-num">Q' + (idx + 1) + '</div>' +
      '<div class="log-q">'  + esc(q.question) + '</div>' +
      '<div class="log-a">'  + esc(q.answer)   + '</div>';

    /* 先頭に挿入（最新が上）、直近2問だけ残す */
    list.insertBefore(entry, list.firstChild);
    while (list.children.length > 2) { list.removeChild(list.lastChild); }
  }

  function onCorrect() {
    if (ended || currentQ >= TOTAL - 1) return;
    clearTimeout(qTimer);
    accBonus += Math.max(0, Q_TIME - qElapsed());
    beginQ(currentQ + 1);
  }

  /* stopBgm=true: ボタン押下 → BGM即停止 / false: タイムアップ → BGM継続 */
  function endQuiz(stopBgm) {
    if (ended) return;
    ended = true;
    clearInterval(uiTimer);
    clearTimeout(qTimer);
    if (stopBgm) { bgmEl.pause(); bgmEl.currentTime = 0; }
    buildReview();
    showScreen('screen-end');
  }

  function buildReview() {
    var list = gid('review-list');
    list.innerHTML = '';
    questions.forEach(function(q, i) {
      var item = document.createElement('div');
      item.className = 'review-item';
      item.innerHTML =
        '<div class="review-num">Q' + (i + 1) + '</div>' +
        '<div class="review-q">'  + esc(q.question) + '</div>' +
        '<div class="review-a-wrap">' +
          '<span class="review-a-label">ANSWER</span>' +
          '<span class="review-a">' + esc(q.answer) + '</span>' +
        '</div>';
      list.appendChild(item);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function goBack() {
    clearInterval(uiTimer);
    clearTimeout(qTimer);
    bgmEl.pause();
    bgmEl.currentTime = 0;
    selectedDiff = null;
    document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('sel'); });
    gid('btn-start').classList.remove('ready');
    showScreen('screen-start');
  }

  function tick() {
    if (ended) return;
    var el = elapsed();

    if (el < COUNTDOWN) {
      gid('countdown-num').textContent = Math.ceil(COUNTDOWN - el);
      return;
    }
    if (currentQ < 0) return;

    var isLast = (currentQ === TOTAL - 1);
    var remaining, limit;

    if (isLast) {
      remaining = Math.max(0, QUIZ_END - el);
      limit     = q12Limit;
    } else {
      remaining = Math.max(0, Q_TIME - qElapsed());
      limit     = Q_TIME;
    }

    var pct = limit > 0 ? Math.min(100, (remaining / limit) * 100) : 0;
    var cls = isLast
      ? (remaining > 10 ? 'ok' : remaining > 3 ? 'warn' : 'danger')
      : (remaining > 2.5 ? 'ok' : remaining > 1.0 ? 'warn' : 'danger');
    var disp = isLast ? Math.ceil(remaining).toString() : remaining.toFixed(1);

    gid('timer-num').textContent = disp;
    gid('timer-num').className   = 'timer-num ' + cls;
    gid('timer-bar').style.width = pct + '%';
    gid('timer-bar').className   = 'timer-bar ' + cls;
  }
</script>
</body>
</html>
